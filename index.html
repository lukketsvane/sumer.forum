  <link rel="stylesheet" href="/styles.css" />
</head>
<body id="top">
  <nav class="nav">
    <a class="nav__brand" href="#top">SUMER</a>
    <div class="nav__menu">
      <div class="nav__links">
        <a href="#about">Om</a>
        <a href="#join">Prosjekter</a>
        <a href="mailto:utelivsbrevet@vartoslo.no">Kontakt</a>
      </div>
      <div class="themes" role="group" aria-label="Farge">
        <button type="button" class="themes__btn" data-set="gul" aria-label="Gul"></button>
        <button type="button" class="themes__btn" data-set="terrakotta" aria-label="Terrakotta"></button>
        <button type="button" class="themes__btn" data-set="blaa" aria-label="Blå"></button>
        <button type="button" class="themes__btn" data-set="gronn" aria-label="Grønn"></button>
        <button type="button" class="themes__btn" data-set="natt" aria-label="Natt"></button>
      </div>
    </div>
  </nav>

  <main>
    <section class="hero" id="about">
      <!-- SUMER-merket lenker til Instagram (Frozen Jungle — ingen egen SUMER-konto enda). -->
      <a class="hero__emblem" href="https://www.instagram.com/frozenxjungle/" target="_blank" rel="noopener noreferrer" aria-label="SUMER på Instagram">
        <img src="/assets/sumer-tegning.jpg" width="640" height="640" alt="SUMER-tegning" decoding="async" />
      </a>
      <h1 class="hero__title">Uteliv. Kultur.<br />Musikk. Samtale.</h1>
      <p class="hero__lede">Vi bygger rom for fellesskap og uttrykk på tvers av Vest-Asia og Nord-Afrika – og videre.</p>
    </section>

    <section class="join" id="join">
      <div class="join__inner">
        <div class="join__text">
          <h2 class="join__title">Bli med i bevegelsen.</h2>
          <p class="join__sub">Kultur. Arrangementer. Nye prosjekter.</p>

          <form class="join__form" id="signup-form" novalidate>
            <label class="visually-hidden" for="email">E-postadresse</label>
            <input
              id="email"
              name="email"
              type="email"
              inputmode="email"
              autocomplete="email"
              autocapitalize="off"
              autocorrect="off"
              spellcheck="false"
              placeholder="E-posten din"
              required
            />
            <button type="submit">Få beskjed</button>
          </form>
          <p class="join__msg" id="form-msg" role="status" aria-live="polite"></p>
        </div>
      </div>
    </section>
  </main>

  <footer class="foot">
    <div class="foot__brand">
      <span class="foot__word">SUMER</span>
      <span class="foot__ar" lang="ar" dir="rtl">سومر</span>
    </div>
    <nav class="foot__social" aria-label="Sosiale medier">
      <a href="https://www.instagram.com/frozenxjungle/" target="_blank" rel="noopener noreferrer">Instagram</a>
    </nav>
  </footer>

  <script src="/script.js" defer></script>
</body>
</html>
