<body id="top">
  <nav class="nav">
    <a class="nav__brand" href="#top">SUMER</a>

  <main>
    <section class="hero" id="about">
      <span class="deco" aria-hidden="true">
        <svg class="deco__s" style="top:13%;left:9%;width:18px"  viewBox="0 0 24 24"><path d="M12 0c1 8 4 11 12 12-8 1-11 4-12 12-1-8-4-11-12-12 8-1 11-4 12-12Z"/></svg>
        <svg class="deco__s" style="top:9%;left:84%;width:26px"  viewBox="0 0 24 24"><path d="M12 0c1 8 4 11 12 12-8 1-11 4-12 12-1-8-4-11-12-12 8-1 11-4 12-12Z"/></svg>
        <svg class="deco__d" style="top:30%;left:6%;width:20px"  viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" transform="rotate(45 12 12)"/></svg>
        <svg class="deco__s deco__g" style="top:26%;left:90%;width:16px" viewBox="0 0 24 24"><path d="M12 0c1 8 4 11 12 12-8 1-11 4-12 12-1-8-4-11-12-12 8-1 11-4 12-12Z"/></svg>
        <svg class="deco__s" style="top:44%;left:12%;width:14px" viewBox="0 0 24 24"><path d="M12 0c1 8 4 11 12 12-8 1-11 4-12 12-1-8-4-11-12-12 8-1 11-4 12-12Z"/></svg>
        <svg class="deco__d deco__g" style="top:48%;left:86%;width:18px" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" transform="rotate(45 12 12)"/></svg>
        <svg class="deco__s" style="top:70%;left:7%;width:22px" viewBox="0 0 24 24"><path d="M12 0c1 8 4 11 12 12-8 1-11 4-12 12-1-8-4-11-12-12 8-1 11-4 12-12Z"/></svg>
        <svg class="deco__s deco__g" style="top:74%;left:91%;width:20px" viewBox="0 0 24 24"><path d="M12 0c1 8 4 11 12 12-8 1-11 4-12 12-1-8-4-11-12-12 8-1 11-4 12-12Z"/></svg>
        <svg class="deco__s" style="top:90%;left:16%;width:14px" viewBox="0 0 24 24"><path d="M12 0c1 8 4 11 12 12-8 1-11 4-12 12-1-8-4-11-12-12 8-1 11-4 12-12Z"/></svg>
        <svg class="deco__s" style="top:88%;left:82%;width:16px" viewBox="0 0 24 24"><path d="M12 0c1 8 4 11 12 12-8 1-11 4-12 12-1-8-4-11-12-12 8-1 11-4 12-12Z"/></svg>
      </span>

      <!-- SUMER-merket lenker til Instagram (Frozen Jungle — ingen egen SUMER-konto enda). -->
      <a class="hero__emblem" href="https://www.instagram.com/frozenxjungle/" target="_blank" rel="noopener noreferrer" aria-label="SUMER på Instagram">
        <img src="/assets/sumer-emblem.png" width="640" height="640" alt="SUMER-merke" decoding="async" />
      </a>

      <h1 class="hero__title">Natteliv.<br />Kultur.<br />Musikk.<br />Samtaler.</h1>
      <p class="hero__lede">Vi bygger rom for tilknytning, uttrykk og samarbeid på tvers av Vest-Asia, Nord-Afrika og videre.</p>

      <p class="count__label">Lanseres snart</p>
      <div class="count" role="timer" aria-label="Nedtelling til lansering">
        <button type="button" class="count__cell" id="count-toggle" aria-label="Bytt farge">
          <span class="count__num" id="cd-days">--</span><span class="count__unit">Dager</span>
        </button>
        <span class="count__sep" aria-hidden="true">:</span>
        <button type="button" class="count__cell" aria-label="Bytt farge">
          <span class="count__num" id="cd-hours">--</span><span class="count__unit">Timer</span>
        </button>
        <span class="count__sep" aria-hidden="true">:</span>
        <button type="button" class="count__cell" aria-label="Bytt farge">
          <span class="count__num" id="cd-mins">--</span><span class="count__unit">Minutter</span>
        </button>
        <span class="count__sep" aria-hidden="true">:</span>
        <button type="button" class="count__cell" aria-label="Bytt farge">
          <span class="count__num" id="cd-secs">--</span><span class="count__unit">Sekunder</span>
        </button>
      </div>
    </section>

    <section class="join" id="join">
      <div class="join__inner">
        <div class="join__text">
          <h2 class="join__title">Bli med i bevegelsen.</h2>
          <p class="join__sub">Kultur. Arrangementer. Nye prosjekter.</p>

          <form class="join__form" id="signup-form" novalidate>
            <label class="visually-hidden" for="email">E-postadresse</label>
            <input
              id="email"
              name="email"
              type="email"
              inputmode="email"
              autocomplete="email"
              autocapitalize="off"
              autocorrect="off"
              spellcheck="false"
              placeholder="E-postadressen din"
              required
            />
            <button type="submit">Få beskjed</button>
          </form>
          <p class="join__msg" id="form-msg" role="status" aria-live="polite"></p>
        </div>
        <span class="join__emblem" aria-hidden="true">
          <img src="/assets/sumer-emblem.png" width="200" height="200" alt="" decoding="async" />
        </span>
      </div>
    </section>
  </main>

  <footer class="foot">
    <nav class="foot__social" aria-label="Sosiale medier">
      <a href="https://www.instagram.com/frozenxjungle/" target="_blank" rel="noopener noreferrer">Instagram</a>

      <a href="https://x.com/" target="_blank" rel="noopener noreferrer">X (Twitter)</a>

    <div class="foot__stars" aria-hidden="true"></div>
