<!DOCTYPE html>
<html lang="nn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6e2f1f" />
  <meta name="color-scheme" content="dark" />

  <title>SUMER · is coming</title>
  <meta name="description" content="SUMER — eit kreativt kollektiv i skjeringspunktet mellom uteliv, kultur, musikk og samtale. Meld deg på utelivsbrevet." />

  <!-- Open Graph / social -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="SUMER" />
  <meta property="og:title" content="SUMER is coming" />
  <meta property="og:description" content="Eit kreativt kollektiv i skjeringspunktet mellom uteliv, kultur, musikk og samtale. Meld deg på utelivsbrevet." />
  <meta property="og:url" content="https://sumer.forum" />
  <meta property="og:image" content="assets/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="SUMER is coming" />
  <meta name="twitter:description" content="Eit kreativt kollektiv i skjeringspunktet mellom uteliv, kultur, musikk og samtale." />
  <meta name="twitter:image" content="assets/og.png" />

  <!-- icons -->
  <link rel="icon" type="image/png" href="assets/icon.png" />
  <link rel="apple-touch-icon" href="assets/apple-icon.png" />
  <link rel="manifest" href="site.webmanifest" />

  <!-- iOS web-app -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SUMER" />
  <meta name="format-detection" content="telephone=no" />

  <!-- fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="glow" aria-hidden="true"></div>

  <main class="stage">
    <!-- SUMER is linked to the Instagram profile.
         TODO: confirm the real handle — defaulting to instagram.com/sumer (alt: @frozenxjungle) -->
    <a class="brand" href="https://www.instagram.com/sumer/" target="_blank" rel="noopener noreferrer"
       aria-label="SUMER på Instagram">
      <span class="medallion">
        <img src="assets/sumer-logo.png" width="480" height="480" alt="SUMER-logo" decoding="async" />
      </span>
      <span class="wordmark">SUMER</span>
    </a>

    <p class="coming"><span class="coming__is">is</span> coming</p>

    <p class="tagline">Eit kreativt kollektiv i skjeringspunktet mellom<br class="br-desktop" />
      uteliv, kultur, musikk og samtale.</p>

    <section class="signup" aria-labelledby="signup-title">
      <h2 class="signup__title" id="signup-title">utelivsbrevet</h2>
      <p class="signup__lead">Nyhendebrev om uteliv og bransje &mdash; rett i innboksen.</p>

      <form class="signup__form" id="signup-form" novalidate>
        <label class="visually-hidden" for="email">E-postadresse</label>
        <input
          id="email"
          name="email"
          type="email"
          inputmode="email"
          autocomplete="email"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
          placeholder="din.epost@adresse.no"
          required
        />
        <button type="submit">
          <span class="btn-label">Meld meg på</span>
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" focusable="false">
            <path d="M5 12h13M13 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2.4"
                  stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
      </form>
      <p class="signup__msg" id="form-msg" role="status" aria-live="polite"></p>
    </section>

    <a class="ig" href="https://www.instagram.com/sumer/" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
        <rect x="3" y="3" width="18" height="18" rx="5" fill="none" stroke="currentColor" stroke-width="1.9" />
        <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="1.9" />
        <circle cx="17.4" cy="6.6" r="1.3" fill="currentColor" />
      </svg>
      <span>Følg på Instagram</span>
    </a>

    <div class="swatches" aria-hidden="true">
      <span style="--c:var(--acid)"></span>
      <span style="--c:var(--orchid)"></span>
      <span style="--c:var(--ocean)"></span>
      <span style="--c:var(--cream)"></span>
    </div>
  </main>

  <footer class="foot">
    <span>SUMER</span><i></i><span>Oslo</span><i></i><span>MMXXVI</span>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
